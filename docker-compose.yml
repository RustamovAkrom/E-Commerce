# ─── Production environment ──────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # then fill in all CHANGE_ME values
#   docker compose up -d
#
# Single source of truth: root .env — all services read from it.
# Backend/frontend do NOT have their own .env in Docker; only root .env is used.
#
# Services:
#   postgres   — PostgreSQL 16
#   redis      — Redis 7 (password-protected)
#   rabbitmq   — RabbitMQ 3 (Celery broker)
#   minio      — S3-compatible object storage
#   backend    — FastAPI (4 uvicorn workers)
#   frontend   — Next.js standalone (Node server)
#   bot        — Telegram bot (aiogram 3, webhook mode)
#
# nginx is commented out — uncomment when you have SSL certificates.
# See nginx/nginx.conf and nginx/certs/README.md for setup instructions.

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  # ─── RabbitMQ (Celery broker) ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - backend_net

  # ─── MinIO (S3-compatible storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  # ─── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env                        # single source — root .env
    environment:
      # Database configuration (assembled in config.py)
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_ASYNC_DRIVER: asyncpg
      DATABASE_SYNC_DRIVER: psycopg2
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      MINIO_ENDPOINT: "minio:9000"
      BACKEND_API_URL: "http://backend:8000"
    ports:
      - "8000:8000"                       # direct access while nginx is disabled
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend_net
      - frontend_net

  # ─── Frontend (Next.js standalone) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env                        # single source — root .env
    environment:
      # Server-side only: API route handlers call backend via internal Docker hostname.
      # NEXT_PUBLIC_API_URL stays as the public URL (browser → backend direct or via nginx).
      BACKEND_URL: "http://backend:8000"
    ports:
      - "3000:3000"                       # direct access while nginx is disabled
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend_net

  # ─── Telegram Bot ─────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    env_file: .env                        # single source — root .env
    environment:
      BACKEND_API_URL: "http://backend:8000"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/2"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    # on-failure: restart only on crash, not on clean exit (e.g. no BOT_TOKEN)
    restart: on-failure:3
    networks:
      - backend_net

  # ─── Nginx (SSL reverse proxy) ────────────────────────────────────────
  # Uncomment when you have SSL certificates in nginx/certs/:
  #   fullchain.pem  — your certificate chain
  #   privkey.pem    — your private key
  #
  # Certbot example (run on host, not in Docker):
  #   certbot certonly --standalone -d yourdomain.com
  #   cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem nginx/certs/
  #   cp /etc/letsencrypt/live/yourdomain.com/privkey.pem   nginx/certs/
  #
  # Then uncomment below, remove the ports: from backend and frontend above,
  # and update CORS_ORIGINS + ALLOWED_HOSTS in .env to your domain.
  #
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - frontend_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
