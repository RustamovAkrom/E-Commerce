# Alembic configuration. The database URL is injected at runtime from
# src.config.settings inside alembic/env.py, so it is intentionally left blank.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC

[post_write_hooks]
# Two hooks: lint-fix the freshly generated migration, then format it.
# ``exec`` runs the ruff binary directly (ruff ships no console_scripts
# entrypoint). The REVISION_SCRIPT_FILENAME token MUST be placed explicitly —
# alembic otherwise *prepends* the path, yielding ``ruff <file> check --fix``
# (ruff then treats the path as an unknown subcommand). With the token last,
# ruff runs as ``ruff check --fix <file>`` then ``ruff format <file>``.
hooks = ruff_check, ruff_format
ruff_check.type = exec
ruff_check.executable = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
