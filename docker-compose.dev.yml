# ─── Development environment ────────────────────────────────────────────────
# Usage: make dev  (or: docker-compose -f docker-compose.dev.yml up)
#
# Services:
#   postgres    — PostgreSQL 16
#   redis       — Redis 7
#   minio       — S3-compatible storage (console: http://localhost:9001)
#   backend     — FastAPI (hot-reload, debug port 5678)
#   frontend    — Next.js dev server (http://localhost:3000)
#   bot         — Telegram bot (aiogram3)
#
# Volumes:
#   postgres_data — survives container restarts

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "5678:5678"            # debug / pdb
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ecommerce
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars!
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      CORS_ORIGINS: '["http://localhost:3000"]'
      TELEGRAM_BOT_ENABLED: "true"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend (Next.js) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: E-Commerce
      NEXT_PUBLIC_CURRENCY: UZS
      NEXT_PUBLIC_LOCALE: uz-UZ
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # ─── Bot ──────────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8000
      BOT_TOKEN: ""
      TELEGRAM_AUTH_SECRET: ""
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:
